<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .result-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h2 {
            color: #333;
            font-size: 1.8em;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .price-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        h3 {
            color: white;
            font-size: 3em;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9em;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 40px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1em;
            border: 2px solid #667eea;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        a:active {
            transform: translateY(0);
        }

        .info-text {
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .result-container {
                padding: 40px 25px;
            }

            h2 {
                font-size: 1.5em;
            }

            h3 {
                font-size: 2.2em;
            }

            .icon {
                font-size: 3em;
            }
        }
    </style>
</head>
<body>
    <div class="result-container">
        <div class="icon">🏠</div>
        
        <h2>Predicted House Price</h2>

        <div class="price-box">
            <h3>₹ {{ prediction }}</h3>
            <p class="label">Estimated Value</p>
        </div>

        <p class="info-text">This prediction is based on the property details you provided using machine learning algorithms.</p>

        <a href="/">← Predict Again</a>
    </div>
</body>
</html>
